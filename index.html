<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>QR Registration</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
    --primary: #1f2937;
    --secondary: #374151;
    --border: #e5e7eb;
    --accent: #b91c1c;
    --bg: #f9fafb;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--primary);
    touch-action: manipulation;
}

/* Prevent mobile zoom */
input, select, button {
    font-size: 16px;
}

/* Layout */
.container {
    max-width: 1100px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    gap: 24px;
    padding: 24px;
}

.card {
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    padding: 24px;
}

/* Left form */
.form-card {
    flex: 1;
}

.form-card h2 {
    margin: 0 0 16px 0;
    font-size: 20px;
    font-weight: 600;
}

.field {
    margin-bottom: 14px;
}

label {
    display: block;
    font-size: 13px;
    color: var(--secondary);
    margin-bottom: 4px;
}

input, select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    outline: none;
}

input:focus, select:focus {
    border-color: var(--primary);
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 16px;
    border-radius: 8px;
    border: none;
    background: var(--primary);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #111827;
}

/* Right QR */
.qr-card {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
}

#blinkNote {
    display: none;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    animation: blink 1s infinite;
    text-align: center;
}

@keyframes blink {
    50% { opacity: 0; }
}

#slotDisplay {
    display: none;
    font-size: 22px;
    font-weight: 700;
}

#qrcode canvas {
    width: 260px;
    height: 260px;
}

.info-text {
    display: none;
    font-size: 14px;
    text-align: center;
    max-width: 320px;
}

.warning {
    display: none;
    font-size: 13px;
    color: var(--accent);
    text-align: center;
    max-width: 320px;
}

/* Mobile */
@media (max-width: 900px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- FORM -->
    <div class="card form-card">
        <h2>Registration Details</h2>

        <div class="field">
            <label>Application Type</label>
            <select id="applicationType" onchange="toggleOther(this,'applicationTypeOther')">
                <option value="">Select</option>
                <option>Permanent</option>
                <option>Temporary</option>
                <option>Other</option>
            </select>
            <input id="applicationTypeOther" placeholder="Other Application Type" style="display:none;margin-top:6px;">
        </div>

        <div class="field"><label>First Name</label><input id="firstName"></div>
        <div class="field"><label>Preferred First Name</label><input id="preferredFirstName"></div>
        <div class="field"><label>Middle Name</label><input id="middleName"></div>
        <div class="field"><label>Last Name</label><input id="lastName"></div>

        <div class="field">
            <label>Date of Birth (DD/MM/YYYY)</label>
            <input id="birthDate" inputmode="numeric" pattern="[0-9/]*" maxlength="10" oninput="formatDate(this)">
        </div>

        <div class="field">
            <label>Reason of Admission</label>
            <select id="reason" onchange="toggleOther(this,'reasonOther')">
                <option value="">Select</option>
                <option>Employment</option>
                <option>Study</option>
                <option>Medical</option>
                <option>Other</option>
            </select>
            <input id="reasonOther" placeholder="Other Reason" style="display:none;margin-top:6px;">
        </div>

        <div class="field"><label>Email</label><input id="email" inputmode="email"></div>
        <div class="field"><label>Phone Number</label><input id="phone" inputmode="numeric" pattern="[0-9]*"></div>
        <div class="field"><label>Position</label><input id="position"></div>

        <button onclick="generateQR()">Generate QR Code</button>
    </div>

    <!-- QR -->
    <div class="card qr-card" id="qrSection">
        <div id="blinkNote">Please take a screenshot</div>
        <div id="slotDisplay"></div>
        <div id="qrcode"></div>
        <div class="info-text" id="instruction">
            Please wait until your number arrives and show the QR code to the staff member to continue
        </div>
        <div class="warning" id="warning">
            Warning: Closing or refreshing this page will cancel your slot.
        </div>
    </div>

</div>

<script>
let qrGenerated = false;

window.addEventListener("beforeunload", e => {
    if (qrGenerated) {
        e.preventDefault();
        e.returnValue = "Closing this window will cancel your slot.";
    }
});

function toggleOther(select, otherId) {
    document.getElementById(otherId).style.display =
        select.value === "Other" ? "block" : "none";
}

function formatDate(input) {
    let v = input.value.replace(/\D/g,'');
    if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + '/' + v.slice(5,9);
    input.value = v;
}

function val(id) {
    return document.getElementById(id).value.trim();
}

function generateSlotNumbers() {
    const d = new Date();
    const longSlot =
        d.getFullYear() +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') +
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0') +
        String(d.getSeconds()).padStart(2,'0');

    const shortSlot =
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0');

    return { longSlot, shortSlot };
}

function generateQR() {
    const slots = generateSlotNumbers();

    const appType = val("applicationType") === "Other"
        ? val("applicationTypeOther")
        : val("applicationType");

    const reason = val("reason") === "Other"
        ? val("reasonOther")
        : val("reasonOther") || val("reason");

    const data = [
        slots.longSlot,
        appType,
        val("firstName"),
        val("preferredFirstName"),
        val("middleName"),
        val("lastName"),
        val("birthDate"),
        reason,
        val("email"),
        val("phone"),
        val("position")
    ].join("\t");

    const qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = "";

    new QRCode(qrDiv, {
        text: data,
        width: 260,
        height: 260,
        correctLevel: QRCode.CorrectLevel.L
    });

    document.getElementById("slotDisplay").innerText =
        "Slot Number: " + slots.shortSlot;

    document.getElementById("slotDisplay").style.display = "block";
    document.getElementById("instruction").style.display = "block";
    document.getElementById("warning").style.display = "block";
    document.getElementById("blinkNote").style.display = "block";

    qrGenerated = true;

    document.getElementById("qrSection").scrollIntoView({
        behavior: "smooth",
        block: "start"
    });
}
</script>

</body>
</html>
